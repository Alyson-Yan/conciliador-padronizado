<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conciliador Modular</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="page">
        <section class="card">
            <header class="header">
                <div>
                    <p class="tag">Conciliação financeira</p>
                    <h1>Conciliador</h1>
                    <p class="subtitle">
                        Selecione a instituição e envie os arquivos para gerar o relatório.
                    </p>
                </div>

                <span class="api-status">API ativa</span>
            </header>

            <section class="institution-section">
                <p class="label">Instituição</p>

                <div class="institution-options">
                    <button type="button" class="institution-btn" data-instituicao="cielo">
                        Cielo
                    </button>

                    <button type="button" class="institution-btn" data-instituicao="getnet">
                        GetNet
                    </button>

                    <button type="button" class="institution-btn" data-instituicao="pagbank">
                        PagBank
                    </button>

                    <button type="button" class="institution-btn" data-instituicao="credishop">
                        CredShop
                    </button>
                </div>
            </section>

            <section class="selected-box" id="selected-box">
                <strong id="selected-name">Nenhuma instituição selecionada</strong>
                <span id="selected-format">Escolha uma instituição para continuar.</span>
            </section>

            <form id="form-conciliacao">
                <input type="hidden" id="instituicao" name="instituicao">

                <div class="field">
                    <label for="arquivo_erp">Arquivo ERP</label>
                    <input
                        type="file"
                        id="arquivo_erp"
                        name="arquivo_erp"
                        accept=".csv"
                        required
                    >
                </div>

                <div class="field">
                    <label for="arquivo_instituicao" id="label-instituicao">
                        Arquivo da instituição
                    </label>
                    <input
                        type="file"
                        id="arquivo_instituicao"
                        name="arquivo_instituicao"
                        required
                    >
                </div>

                <button type="submit" id="botao-conciliar" disabled>
                    Conciliar e baixar relatório
                </button>
            </form>

            <div id="status" class="status"></div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
